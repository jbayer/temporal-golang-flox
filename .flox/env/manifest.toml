schema-version = "1.12.0"

# Minimal Temporal environment for use with [include].
#
# Provides a Temporal dev server with SQLite storage
# and built-in Web UI. No external dependencies.
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/temporal"]
#
# Customize vars in your manifest to override defaults:
#
#   [vars]
#   TEMPORAL_PORT = "17233"

[install]
temporal-cli.pkg-path = "temporal-cli"
temporal-cli.pkg-group = "temporal"
go.pkg-path = "go"
gum.pkg-path = "gum"

[vars]
TEMPORAL_HOST = "127.0.0.1"
TEMPORAL_PORT = "7233"
TEMPORAL_UI_PORT = "8233"

[hook]
on-activate = '''
export TEMPORAL_DATA="$FLOX_ENV_CACHE/temporal"

if [ ! -d "$TEMPORAL_DATA" ]; then
  mkdir -p "$TEMPORAL_DATA"
fi

gum style \
  --border rounded --border-foreground 212 \
  --padding "1 2" --margin "1 0" \
  "$(gum style --bold --foreground 212 'Temporal Golang Getting Started')" \
  "" \
  "$(gum style --bold 'Check service status:')" \
  "  flox services status" \
  "" \
  "$(gum style --bold 'View service logs:')" \
  "  flox services logs temporal" \
  "  flox services logs worker" \
  "" \
  "$(gum style --bold 'Send a hello workflow:')" \
  "  go run ./start/main.go YourName" \
  "" \
  "$(gum style --bold 'Open the Temporal Web UI:')" \
  "  http://$TEMPORAL_HOST:$TEMPORAL_UI_PORT"
'''

[services]
auto-start = true

temporal.command = '''
  TEMPORAL_DATA="$FLOX_ENV_CACHE/temporal"
  mkdir -p "$TEMPORAL_DATA"
  exec temporal server start-dev \
    --ip "$TEMPORAL_HOST" \
    --port "$TEMPORAL_PORT" \
    --ui-port "$TEMPORAL_UI_PORT" \
    --db-filename "$TEMPORAL_DATA/temporal.db"
'''

worker.command = '''
  until temporal workflow list --address "$TEMPORAL_HOST:$TEMPORAL_PORT" > /dev/null 2>&1; do
    sleep 1
  done
  cd "$FLOX_ENV_PROJECT"
  exec go run ./worker/main.go
'''
