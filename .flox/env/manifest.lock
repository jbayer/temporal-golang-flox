{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "codex": {
        "pkg-path": "flox/codex",
        "pkg-group": "codex"
      },
      "flox-ai": {
        "pkg-path": "flox/flox-ai",
        "pkg-group": "flox-ai"
      },
      "gcc": {
        "pkg-path": "gcc"
      },
      "git": {
        "pkg-path": "git"
      },
      "go": {
        "pkg-path": "go"
      },
      "gum": {
        "pkg-path": "gum"
      },
      "less": {
        "pkg-path": "less"
      },
      "skills-temporal-developer": {
        "pkg-path": "flox/skills-temporal-developer",
        "pkg-group": "skills-temporal-developer"
      },
      "temporal-cli": {
        "pkg-path": "temporal-cli",
        "pkg-group": "temporal"
      },
      "vim": {
        "pkg-path": "vim"
      }
    },
    "vars": {
      "TEMPORAL_HOST": "0.0.0.0",
      "TEMPORAL_PORT": "7233",
      "TEMPORAL_UI_PORT": "8233"
    },
    "hook": {
      "on-activate": "export TEMPORAL_DATA=\"$FLOX_ENV_CACHE/temporal\"\n\nif [ ! -d \"$TEMPORAL_DATA\" ]; then\n  mkdir -p \"$TEMPORAL_DATA\"\nfi\n\ngum style \\\n  --border rounded --border-foreground 212 \\\n  --padding \"1 2\" --margin \"1 0\" \\\n  \"$(gum style --bold --foreground 212 'Temporal Golang Getting Started')\" \\\n  \"\" \\\n  \"$(gum style --bold 'Check service status:')\" \\\n  \"  flox services status\" \\\n  \"\" \\\n  \"$(gum style --bold 'View service logs:')\" \\\n  \"  flox services logs temporal\" \\\n  \"  flox services logs worker\" \\\n  \"\" \\\n  \"$(gum style --bold 'Send a hello workflow:')\" \\\n  \"  go run ./start/main.go YourName\" \\\n  \"\" \\\n  \"$(gum style --bold 'Open the Temporal Web UI:')\" \\\n  \"  http://$TEMPORAL_HOST:$TEMPORAL_UI_PORT\"\n"
    },
    "profile": {
      "bash": "",
      "zsh": "",
      "fish": ""
    },
    "options": {},
    "services": {
      "auto-start": true,
      "temporal": {
        "command": "  TEMPORAL_DATA=\"$FLOX_ENV_CACHE/temporal\"\n  mkdir -p \"$TEMPORAL_DATA\"\n  exec temporal server start-dev \\\n    --ip \"$TEMPORAL_HOST\" \\\n    --port \"$TEMPORAL_PORT\" \\\n    --ui-port \"$TEMPORAL_UI_PORT\" \\\n    --db-filename \"$TEMPORAL_DATA/temporal.db\"\n"
      },
      "worker": {
        "command": "  until temporal workflow list --address \"$TEMPORAL_HOST:$TEMPORAL_PORT\" > /dev/null 2>&1; do\n    sleep 1\n  done\n  cd \"$FLOX_ENV_PROJECT\"\n  exec go run ./worker/main.go\n"
      }
    }
  },
